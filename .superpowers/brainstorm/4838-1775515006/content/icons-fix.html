<h2>修复：数独数字居中 + 德扑重新设计</h2>
<p class="subtitle">数独两版修复，德扑两版新设计，点击选择</p>

<style>
  :root {
    --px-accent: #7c3aed;
    --px-card: #0f0f1a;
    --px-text: #c4b5fd;
    --px-muted: #6b7280;
    --px-bg: #07071a;
  }
  .icon-section { margin-bottom: 32px; }
  .icon-section h3 { font-size: 13px; font-family: sans-serif; color: var(--px-text); margin-bottom: 12px; font-weight: 700; }
  .icon-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
  .icon-card {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer;
    padding: 16px 20px 14px;
    border-radius: 12px;
    border: 1px solid rgba(124,58,237,0.2);
    background: var(--px-card);
    transition: all 0.2s;
    min-width: 110px;
  }
  .icon-card:hover { border-color: rgba(124,58,237,0.7); background: rgba(124,58,237,0.08); transform: translateY(-2px); }
  .icon-card.selected-icon { border-color: #7c3aed; background: rgba(124,58,237,0.15); box-shadow: 0 0 0 2px rgba(124,58,237,0.4); }
  .icon-wrap { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; }
  .icon-label { font-size: 10px; font-family: monospace; color: var(--px-muted); text-align: center; line-height: 1.4; }
  .divider { height: 1px; background: rgba(124,58,237,0.12); margin: 24px 0; }
</style>

<!-- ══ SUDOKU ══ -->
<div class="icon-section">
  <h3>🔢 数独 (Sudoku) — 数字完全居中</h3>
  <div class="icon-row">

    <!-- S1: 3x3 blocks, numbers in cell centers via text-anchor+dominant-baseline -->
    <div class="icon-card" onclick="this.classList.toggle('selected-icon')">
      <div class="icon-wrap">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- outer border -->
          <rect x="3" y="3" width="46" height="46" rx="4" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
          <!-- thin lines (divide each block into 3) -->
          <!-- vertical thin -->
          <line x1="18.3" y1="3" x2="18.3" y2="49" stroke="#7c3aed" stroke-width="0.7" opacity="0.3"/>
          <line x1="33.7" y1="3" x2="33.7" y2="49" stroke="#7c3aed" stroke-width="0.7" opacity="0.3"/>
          <!-- horizontal thin -->
          <line x1="3" y1="18.3" x2="49" y2="18.3" stroke="#7c3aed" stroke-width="0.7" opacity="0.3"/>
          <line x1="3" y1="33.7" x2="49" y2="33.7" stroke="#7c3aed" stroke-width="0.7" opacity="0.3"/>
          <!-- numbers in each of 9 cells, perfectly centered -->
          <!-- cell centers: x = 10.65, 26, 41.35 | y = 10.65, 26, 41.35 -->
          <text x="10.65" y="10.65" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">3</text>
          <text x="26"    y="10.65" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#c4b5fd" font-family="monospace" opacity="0.35">·</text>
          <text x="41.35" y="10.65" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">7</text>
          <text x="10.65" y="26"    text-anchor="middle" dominant-baseline="central" font-size="9" fill="#c4b5fd" font-family="monospace" opacity="0.35">·</text>
          <text x="26"    y="26"    text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">5</text>
          <text x="41.35" y="26"    text-anchor="middle" dominant-baseline="central" font-size="9" fill="#c4b5fd" font-family="monospace" opacity="0.35">·</text>
          <text x="10.65" y="41.35" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">9</text>
          <text x="26"    y="41.35" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">2</text>
          <text x="41.35" y="41.35" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#c4b5fd" font-family="monospace" opacity="0.35">·</text>
        </svg>
      </div>
      <div class="icon-label">3×3 格，数字精确居中</div>
    </div>

    <!-- S2: highlighted active cell, all 9 centers correct -->
    <div class="icon-card" onclick="this.classList.toggle('selected-icon')">
      <div class="icon-wrap">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- active cell background (center cell) -->
          <rect x="18.3" y="18.3" width="15.4" height="15.4" rx="2" fill="rgba(124,58,237,0.3)"/>
          <!-- outer border -->
          <rect x="3" y="3" width="46" height="46" rx="4" stroke="#7c3aed" stroke-width="2" opacity="0.65"/>
          <!-- thin dividers -->
          <line x1="18.3" y1="3"  x2="18.3" y2="49" stroke="#7c3aed" stroke-width="0.7" opacity="0.3"/>
          <line x1="33.7" y1="3"  x2="33.7" y2="49" stroke="#7c3aed" stroke-width="0.7" opacity="0.3"/>
          <line x1="3"  y1="18.3" x2="49" y2="18.3" stroke="#7c3aed" stroke-width="0.7" opacity="0.3"/>
          <line x1="3"  y1="33.7" x2="49" y2="33.7" stroke="#7c3aed" stroke-width="0.7" opacity="0.3"/>
          <!-- numbers, all centered -->
          <text x="10.65" y="10.65" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">4</text>
          <text x="26"    y="10.65" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#c4b5fd" font-family="monospace" opacity="0.3">·</text>
          <text x="41.35" y="10.65" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">8</text>
          <text x="10.65" y="26"    text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">6</text>
          <!-- active cell: brighter, bigger -->
          <text x="26"    y="26"    text-anchor="middle" dominant-baseline="central" font-size="11" fill="#e9d5ff" font-family="monospace" font-weight="900">5</text>
          <text x="41.35" y="26"    text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">3</text>
          <text x="10.65" y="41.35" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#c4b5fd" font-family="monospace" opacity="0.3">·</text>
          <text x="26"    y="41.35" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">1</text>
          <text x="41.35" y="41.35" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#a78bfa" font-family="monospace" font-weight="700">9</text>
        </svg>
      </div>
      <div class="icon-label">中心格高亮 + 居中数字</div>
    </div>

  </div>
</div>

<div class="divider"></div>

<!-- ══ POKER ══ -->
<div class="icon-section">
  <h3>♠️ 德州扑克 (Texas Hold'em) — 重新设计</h3>
  <div class="icon-row">

    <!-- P1: Clean spade symbol -->
    <div class="icon-card" onclick="this.classList.toggle('selected-icon')">
      <div class="icon-wrap">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Proper spade shape -->
          <!-- Main spade head: upside-down heart merging to top point -->
          <path d="
            M26 5
            C26 5 8 15 8 26
            C8 33 13 37 20 37
            C22.5 37 25 36 26 34
            C27 36 29.5 37 32 37
            C39 37 44 33 44 26
            C44 15 26 5 26 5 Z
          " fill="#a78bfa" opacity="0.9"/>
          <!-- Stem: small trapezoid at bottom -->
          <path d="M21 37 C19 41 15 44 13 46 L39 46 C37 44 33 41 31 37 Z" fill="#a78bfa" opacity="0.9"/>
          <!-- inner highlight -->
          <path d="
            M26 10
            C26 10 13 19 13 27

      </div>
      <div class="icon-label">标准黑桃形状</div>
    </div>

    <!-- P2: Two overlapping cards (fan) with spade -->
    <div class="icon-card" onclick="this.classList.toggle('selected-icon')">
      <div class="icon-wrap">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Back card (rotated left) -->
          <rect x="6" y="10" width="28" height="38" rx="4"
                fill="#1a0a2e" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"
                transform="rotate(-8 20 29)"/>
          <!-- Front card -->
          <rect x="16" y="8" width="28" height="38" rx="4"
                fill="#0f0f1a" stroke="#7c3aed" stroke-width="1.5"/>
          <!-- Small spade top-left of front card -->
          <path d="M20 14 C20 14 17 17 17 20 C17 22 18.5 23 20 23 C20.5 23 21.2 22.8 21.5 22.2 C21.8 22.8 22.5 23 23 23 C24.5 23 26 22 26 20 C26 17 23 14 23 14 Z M21.5 23 C21 25 19.5 26 18.5 26.5 L25.5 26.5 C24.5 26 23 25 22.5 23 Z" fill="#a78bfa" opacity="0.7"/>
          <!-- Big spade center of front card -->
          <path d="M30 22 C30 22 22 27 22 33 C22 37 24.5 39 28 39 C29.3 39 30.5 38.5 31 37.5 C31.5 38.5 32.7 39 34 39 C37.5 39 40 37 40 33 C40 27 32 22 32 22 Z M31 39 C30 41.5 28 43 27 44 L36 44 C35 43 33 41.5 32 39 Z" fill="#a78bfa"/>
          <!-- rank A top-left corner -->
          <text x="19" y="13" font-size="7" fill="#a78bfa" font-family="monospace" font-weight="700" text-anchor="middle" dominant-baseline="central">A</text>
        </svg>
      </div>
      <div class="icon-label">叠牌 + 黑桃 A</div>
    </div>

    <!-- P3: Minimal spade + suit symbols -->
    <div class="icon-card" onclick="this.classList.toggle('selected-icon')">
      <div class="icon-wrap">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Center spade (clean minimal) -->
          <path d="
            M26 8
            C26 8 11 17 11 27
            C11 33 15.5 37 21 37
            C23 37 25 36.2 26 34.5
            C27 36.2 29 37 31 37
            C36.5 37 41 33 41 27
            C41 17 26 8 26 8 Z
          " fill="#a78bfa"/>
          <path d="M21.5 37 C20 40.5 17 43 15 44.5 L37 44.5 C35 43 32 40.5 30.5 37 Z" fill="#a78bfa"/>
          <!-- 4 suit symbols in corners -->
          <text x="8"  y="10" font-size="8" fill="#7c3aed" font-family="serif" opacity="0.5">♠</text>
          <text x="40" y="10" font-size="8" fill="#ef4444" font-family="serif" opacity="0.5">♥</text>
          <text x="8"  y="48" font-size="8" fill="#ef4444" font-family="serif" opacity="0.5">♦</text>
          <text x="40" y="48" font-size="8" fill="#7c3aed" font-family="serif" opacity="0.5">♣</text>
        </svg>

      <div class="icon-label">大黑桃 + 四角花色</div>
    </div>

  </div>
</div>
