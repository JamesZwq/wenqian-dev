name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Skip auto-merge bot pushes etc — only humans / forks trigger this.
    branches: [main]

# Don't deploy two preview builds for the same PR concurrently.
concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# The preview Worker is a single shared environment (wenqian-dev-preview).
# Concurrent PRs would clobber each other's preview. For solo dev with
# 1 active PR at a time this is fine; if multi-PR concurrency becomes
# a real problem, switch to per-PR Worker names or wrangler versions
# upload (gives unique URLs per version).

jobs:
  deploy-preview:
    name: Deploy to preview Worker
    runs-on: ubuntu-latest
    # Skip on forks — they don't have access to secrets, so the deploy
    # would fail anyway. CI still runs on forks via ci.yml.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Apply pending preview D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply DB --remote --env preview

      - name: Build Worker
        run: npm run build:worker
        env:
          # Sentry source map upload (build-time only; not a runtime secret).
          # If unset, withSentryConfig silently skips upload.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy preview Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = "https://wenqian-dev-preview.zhangwenqian6915.workers.dev";
            const sha = context.sha.substring(0, 7);
            const body = [
              `🚀 **Preview deployed** — commit \`${sha}\``,
              ``,
              `→ ${url}`,
              ``,
              `<sub>Shared preview Worker. Last successful deploy on this PR or any other open PR wins. Re-deploys on every push.</sub>`,
            ].join("\n");
            // Find an existing bot comment and update it; else create.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user?.type === "Bot" && c.body?.includes("**Preview deployed**")
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
