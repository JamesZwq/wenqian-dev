<svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Board grid lines -->
  <line x1="4"  y1="4"  x2="4"  y2="20" stroke="#1C274C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9"  y1="4"  x2="9"  y2="20" stroke="#1C274C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="4"  x2="14" y2="20" stroke="#1C274C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="4"  x2="19" y2="20" stroke="#1C274C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="4"  y1="7"  x2="20" y2="7"  stroke="#1C274C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="4"  y1="12" x2="20" y2="12" stroke="#1C274C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="4"  y1="17" x2="20" y2="17" stroke="#1C274C" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Black stones (filled) — diagonal winning line -->
  <circle cx="4"  cy="17" r="2.2" fill="#1C274C"/>
  <circle cx="9"  cy="12" r="2.2" fill="#1C274C"/>
  <circle cx="14" cy="7"  r="2.2" fill="#1C274C"/>
  <!-- White stones (outlined) -->
  <circle cx="9"  cy="17" r="2.2" fill="white" stroke="#1C274C" stroke-width="1.4"/>
  <circle cx="14" cy="12" r="2.2" fill="white" stroke="#1C274C" stroke-width="1.4"/>
  <circle cx="4"  cy="12" r="2.2" fill="white" stroke="#1C274C" stroke-width="1.4"/>
</svg>
